name: Run CTNH Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/run-bot.yml'
      - 'src/**'
      - 'package.json'
      - 'patches/**'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      MINECRAFT_SERVER_HOST: x1.started.ink
      MINECRAFT_SERVER_PORT: 10014
      MINECRAFT_BOT_USERNAME: test
      WEBUI_PORT: 3000
      AUTO_CONNECT: true

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run CTNH Bot (test connection)
      run: |
        echo "Starting CTNH Bot..."
        echo "Server: $MINECRAFT_SERVER_HOST:$MINECRAFT_SERVER_PORT"
        echo "Username: $MINECRAFT_BOT_USERNAME"
        echo "Auto-connect: $AUTO_CONNECT"
        npm start
        echo "Bot test completed"
